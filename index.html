<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>網上鋼片琴 (Glockenspiel)</title>
    <style>
        :root {
            --case-color: #ffd54f;
            --case-shadow: #d4ac0d;
            --strip-color: #2c3e50;
            --accidental-color: #4a76a8;
            --peg-color: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 避免移動端不必要的選取或反白 */
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }

        h1 {
            color: #333;
            margin-bottom: 5px;
            text-align: center;
            padding: 0 10px;
        }

        p.instruction {
            color: #666;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.95rem;
            padding: 0 10px;
        }

        /* 新增：自適應縮放容器 */
        #glock-container {
            width: 100%;
            display: flex;
            justify-content: center;
            position: relative;
        }

        #scale-wrapper {
            transform-origin: top center;
            /* 讓變換更平滑 */
            transition: transform 0.1s ease-out;
            position: absolute;
            top: 0;
        }

        .glockenspiel-case {
            background-color: var(--case-color);
            padding: 40px 30px;
            border-radius: 40px;
            box-shadow: 
                inset 0 15px 25px rgba(255, 255, 255, 0.4),
                inset 0 -15px 25px rgba(0, 0, 0, 0.15),
                0 20px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            /* 固定原始尺寸，依靠 scale-wrapper 縮放 */
            width: 790px;
            height: 380px;
        }

        .handle {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 40px;
            background-color: var(--case-color);
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: -1;
        }

        .handle-hole {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 25px;
            background-color: #222;
            border-radius: 12px;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.5);
        }

        .keyboard {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* 黑色海綿墊條 */
        .strip {
            position: absolute;
            width: 100%;
            height: 12px;
            background-color: var(--strip-color);
            border-radius: 6px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.6);
            z-index: 1;
        }
        .strip.top-1 { top: 25px; }
        .strip.top-2 { top: 110px; }
        .strip.bottom-1 { bottom: 130px; }
        .strip.bottom-2 { bottom: 25px; }

        .key {
            position: absolute;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-shadow: 
                2px 6px 10px rgba(0,0,0,0.4), 
                inset 1px 1px 2px rgba(255,255,255,0.5),
                inset -1px -2px 4px rgba(0,0,0,0.2);
            z-index: 2;
            transition: transform 0.05s, box-shadow 0.05s, filter 0.05s;
            background-image: linear-gradient(to bottom, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 15%, rgba(0,0,0,0) 85%, rgba(0,0,0,0.15) 100%);
        }

        .key.active {
            transform: translateY(3px) scale(0.98);
            box-shadow: 
                1px 2px 4px rgba(0,0,0,0.4), 
                inset 1px 1px 2px rgba(255,255,255,0.4);
            filter: brightness(1.1);
        }

        .key.natural {
            width: 40px;
            height: 180px;
            bottom: 0;
        }

        .key.accidental {
            width: 34px;
            height: 150px;
            top: 0;
            background-color: var(--accidental-color);
            color: #eee;
        }

        .peg {
            width: 10px;
            height: 10px;
            background-color: var(--peg-color);
            border-radius: 50%;
            margin: 15px 0;
            box-shadow: 
                inset -1px -1px 3px rgba(0,0,0,0.4), 
                1px 1px 2px rgba(255,255,255,0.8);
        }

        .label {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 25px;
            opacity: 0.8;
            pointer-events: none;
        }

        .accidental .label {
            margin-bottom: 20px;
            font-size: 13px;
        }

        /* 按鈕區 */
        .controls {
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap; /* 允許小螢幕自動換行 */
            justify-content: center;
            gap: 15px;
            z-index: 10;
            padding: 0 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #3498db;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s;
            white-space: nowrap;
        }

        button:hover:not(:disabled) {
            background-color: #2980b9;
            transform: translateY(-2px);
        }
        
        button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        #demoBtn {
            background-color: #9b59b6;
        }

        #demoBtn:hover:not(:disabled) {
            background-color: #8e44ad;
        }
    </style>
</head>
<body>

    <h1 id="header-title">網上鋼片琴</h1>
    <p class="instruction" id="header-desc">點擊或觸控琴鍵即可演奏。第一音為 G。</p>

    <div class="controls" id="controls">
        <button id="recordBtn">🔴 錄音</button>
        <button id="playBtn" disabled>▶️ 播放</button>
        <button id="demoBtn">🎵 示範：小星星</button>
    </div>

    <!-- 自適應縮放的容器 -->
    <div id="glock-container">
        <div id="scale-wrapper">
            <div class="glockenspiel-case">
                <div class="handle"></div>
                <div class="handle-hole"></div>
                
                <div class="keyboard" id="keyboard">
                    <!-- 黑色的緩衝海綿條 -->
                    <div class="strip top-1"></div>
                    <div class="strip top-2"></div>
                    <div class="strip bottom-1"></div>
                    <div class="strip bottom-2"></div>
                    <!-- 琴鍵將由 JavaScript 動態生成 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // 音訊上下文
        let audioCtx;

        // 錄音與回放狀態變數
        let isRecording = false;
        let isPlaying = false;
        let recordedNotes = [];
        let recordingStartTime = 0;
        let playbackTimeouts = [];

        // 初始化音訊 (必須在使用者互動後執行)
        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 計算音頻頻率 (A4 = 440Hz)
        function getFreq(noteString) {
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            const note = noteString.match(/[A-Z]#?/)[0];
            const octave = parseInt(noteString.match(/\d/)[0]);
            
            const halfSteps = notes.indexOf(note) + (octave - 4) * 12 - 9;
            return 440 * Math.pow(2, halfSteps / 12);
        }

        // 播放聲音函數
        function playNote(noteString, element) {
            initAudio();
            const freq = getFreq(noteString);
            const t = audioCtx.currentTime;

            if (isRecording && !isPlaying) {
                if (recordedNotes.length === 0) {
                    recordingStartTime = t;
                }
                recordedNotes.push({ note: noteString, time: t - recordingStartTime });
            }

            const osc = audioCtx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, t);

            const strikeOsc = audioCtx.createOscillator();
            strikeOsc.type = 'square';
            strikeOsc.frequency.setValueAtTime(freq * 3.14, t); 

            const masterGain = audioCtx.createGain();
            const strikeGain = audioCtx.createGain();

            masterGain.gain.setValueAtTime(0, t);
            masterGain.gain.linearRampToValueAtTime(0.8, t + 0.01);
            masterGain.gain.exponentialRampToValueAtTime(0.001, t + 2.0);

            strikeGain.gain.setValueAtTime(0, t);
            strikeGain.gain.linearRampToValueAtTime(0.2, t + 0.005);
            strikeGain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);

            osc.connect(masterGain);
            strikeOsc.connect(strikeGain);
            masterGain.connect(audioCtx.destination);
            strikeGain.connect(audioCtx.destination);

            osc.start(t);
            strikeOsc.start(t);
            osc.stop(t + 2.0);
            strikeOsc.stop(t + 0.1);

            if (!element) {
                element = document.querySelector(`[data-note="${noteString}"]`);
            }

            if (element) {
                element.classList.add('active');
                setTimeout(() => {
                    element.classList.remove('active');
                }, 100);
            }
        }

        // --- 介面渲染資料 ---
        const keyWidth = 40;
        const gap = 10;
        const pitch = keyWidth + gap; // 50px
        const accidentalWidth = 34;

        const naturals = [
            { note: 'G5', label: 'G', color: '#e74c3c' }, 
            { note: 'A5', label: 'A', color: '#c0392b' }, 
            { note: 'B5', label: 'B', color: '#f1948a' }, 
            { note: 'C6', label: 'C', color: '#9b59b6' }, 
            { note: 'D6', label: 'D', color: '#3498db' }, 
            { note: 'E6', label: 'E', color: '#2ecc71' }, 
            { note: 'F6', label: 'F', color: '#f1c40f' }, 
            { note: 'G6', label: 'G', color: '#e67e22' }, 
            { note: 'A6', label: 'A', color: '#c0392b' }, 
            { note: 'B6', label: 'B', color: '#f1948a' }, 
            { note: 'C7', label: 'C', color: '#9b59b6' }, 
            { note: 'D7', label: 'D', color: '#3498db' }, 
            { note: 'E7', label: 'E', color: '#2ecc71' }, 
            { note: 'F7', label: 'F', color: '#f1c40f' }, 
            { note: 'G7', label: 'G', color: '#e74c3c' }, 
            { note: 'A7', label: 'A', color: '#c0392b' }  
        ];

        const accidentals = [
            { index: 0, note: 'G#5', label: '#G' },
            { index: 1, note: 'A#5', label: '#A' },
            { index: 3, note: 'C#6', label: '#C' },
            { index: 4, note: 'D#6', label: '#D' },
            { index: 6, note: 'F#6', label: '#F' },
            { index: 7, note: 'G#6', label: '#G' },
            { index: 8, note: 'A#6', label: '#A' },
            { index: 10, note: 'C#7', label: '#C' },
            { index: 11, note: 'D#7', label: '#D' },
            { index: 13, note: 'F#7', label: '#F' },
            { index: 14, note: 'G#7', label: '#G' }
        ];

        const keyboardEl = document.getElementById('keyboard');

        function createKey(data, isNatural, xPos) {
            const key = document.createElement('div');
            key.className = `key ${isNatural ? 'natural' : 'accidental'}`;
            key.style.left = `${xPos}px`;
            key.dataset.note = data.note; 
            
            if (isNatural) {
                key.style.backgroundColor = data.color;
            }

            const topPeg = document.createElement('div');
            topPeg.className = 'peg';
            const bottomPeg = document.createElement('div');
            bottomPeg.className = 'peg';
            
            const label = document.createElement('div');
            label.className = 'label';
            label.innerText = data.label;
            
            if (isNatural) {
                key.appendChild(topPeg);
                key.appendChild(label);
                key.appendChild(bottomPeg);
            } else {
                key.appendChild(topPeg);
                key.appendChild(bottomPeg);
                label.style.position = 'absolute';
                label.style.bottom = '15px';
                key.appendChild(label);
            }

            key.addEventListener('mousedown', (e) => {
                e.preventDefault(); 
                playNote(data.note, key);
            });
            
            key.addEventListener('touchstart', (e) => {
                e.preventDefault(); 
                playNote(data.note, key);
            }, { passive: false });

            return key;
        }

        naturals.forEach((data, i) => {
            const xPos = i * pitch;
            keyboardEl.appendChild(createKey(data, true, xPos));
        });

        accidentals.forEach((data) => {
            const center = data.index * pitch + keyWidth + (gap / 2);
            const xPos = center - (accidentalWidth / 2);
            keyboardEl.appendChild(createKey(data, false, xPos));
        });

        // 錄音與示範邏輯
        const recordBtn = document.getElementById('recordBtn');
        const playBtn = document.getElementById('playBtn');
        const demoBtn = document.getElementById('demoBtn');

        const twinkleData = [
            ['C6', 1], ['C6', 1], ['G6', 1], ['G6', 1], ['A6', 1], ['A6', 1], ['G6', 2],
            ['F6', 1], ['F6', 1], ['E6', 1], ['E6', 1], ['D6', 1], ['D6', 1], ['C6', 2],
            ['G6', 1], ['G6', 1], ['F6', 1], ['F6', 1], ['E6', 1], ['E6', 1], ['D6', 2],
            ['G6', 1], ['G6', 1], ['F6', 1], ['F6', 1], ['E6', 1], ['E6', 1], ['D6', 2],
            ['C6', 1], ['C6', 1], ['G6', 1], ['G6', 1], ['A6', 1], ['A6', 1], ['G6', 2],
            ['F6', 1], ['F6', 1], ['E6', 1], ['E6', 1], ['D6', 1], ['D6', 1], ['C6', 2]
        ];
        const demoTwinkle = [];
        let currentTime = 0;
        const beatLength = 0.5; 
        twinkleData.forEach(([note, beats]) => {
            demoTwinkle.push({ note, time: currentTime });
            currentTime += beats * beatLength;
        });

        recordBtn.addEventListener('click', () => {
            if (isPlaying) return; 
            
            isRecording = !isRecording;
            if (isRecording) {
                recordedNotes = []; 
                recordBtn.innerText = '⏹️ 停止錄音';
                recordBtn.style.backgroundColor = '#e74c3c'; 
                playBtn.disabled = true;
                demoBtn.disabled = true;
            } else {
                recordBtn.innerText = '🔴 錄音';
                recordBtn.style.backgroundColor = ''; 
                playBtn.disabled = recordedNotes.length === 0;
                demoBtn.disabled = false;
            }
        });

        function playSequence(sequence, buttonEl, playingText, originalText) {
            if (isRecording || sequence.length === 0 || isPlaying) return;
            
            isPlaying = true;
            buttonEl.innerText = playingText;
            recordBtn.disabled = true;
            playBtn.disabled = true;
            demoBtn.disabled = true;

            let maxDelay = 0;
            playbackTimeouts.forEach(clearTimeout); 
            playbackTimeouts = [];

            sequence.forEach(record => {
                const delay = record.time * 1000;
                if (delay > maxDelay) maxDelay = delay;
                
                const timeoutId = setTimeout(() => {
                    playNote(record.note, null);
                }, delay);
                playbackTimeouts.push(timeoutId);
            });

            setTimeout(() => {
                isPlaying = false;
                buttonEl.innerText = originalText;
                recordBtn.disabled = false;
                playBtn.disabled = recordedNotes.length === 0;
                demoBtn.disabled = false;
                playbackTimeouts = [];
            }, maxDelay + 2000); 
        }

        playBtn.addEventListener('click', () => {
            playSequence(recordedNotes, playBtn, '⏳ 播放中...', '▶️ 播放');
        });

        demoBtn.addEventListener('click', () => {
            playSequence(demoTwinkle, demoBtn, '⏳ 示範中...', '🎵 示範：小星星');
        });

        // --- 自適應螢幕縮放邏輯 (確保任何裝置皆能完整顯示) ---
        function resizeApp() {
            const container = document.getElementById('glock-container');
            const wrapper = document.getElementById('scale-wrapper');
            
            // 鋼片琴的原始完整寬度與高度 (包含 padding 與 handle)
            const baseWidth = 850; 
            const baseHeight = 480; 

            // 計算可用的畫面空間
            const availableWidth = window.innerWidth - 20; // 左右預留 10px 邊距
            
            // 計算上方 UI 所佔高度，以求出可用高度
            const titleEl = document.getElementById('header-title');
            const descEl = document.getElementById('header-desc');
            const controlsEl = document.getElementById('controls');
            const uiHeight = titleEl.offsetHeight + descEl.offsetHeight + controlsEl.offsetHeight + 100; // 額外邊距
            const availableHeight = window.innerHeight - uiHeight;

            // 計算所需的縮放比例，取寬或高最合適的比例，讓其永遠不超出畫面
            let scaleX = availableWidth / baseWidth;
            let scaleY = availableHeight / baseHeight;
            let scale = Math.min(scaleX, scaleY);
            
            // 設定最大放大限制，避免在大螢幕上模糊
            if (scale > 1.2) scale = 1.2;

            // 套用縮放
            wrapper.style.transform = `scale(${scale})`;
            
            // 同步調整外層容器高度，讓下方元素正常排版
            container.style.height = `${baseHeight * scale}px`;
        }

        // 監聽螢幕旋轉與調整大小事件
        window.addEventListener('resize', resizeApp);
        window.addEventListener('orientationchange', () => setTimeout(resizeApp, 100));
        
        // 初始執行一次
        window.addEventListener('load', resizeApp);
        resizeApp(); // 立即執行

    </script>
</body>
</html>
